apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: ml-pipeline
  labels:
    app: inference-service
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inference-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: inference-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inference
          image: YOUR_ECR_URI/ml-inference-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: inference-config
          env:
            - name: MODEL_BUCKET
              valueFrom:
                secretKeyRef:
                  name: ml-pipeline-secrets
                  key: model_bucket
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
      terminationGracePeriodSeconds: 60

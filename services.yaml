apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: ml-pipeline
  labels:
    app: inference-service
spec:
  type: ClusterIP
  selector:
    app: inference-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ml-pipeline
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
